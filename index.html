<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Dragon Hábitos</title>

<!-- PWA / iOS install metadata -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0E1E36" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Dragon Hábitos" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" href="icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Saira:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #0E1E36; }
  body {
    font-family: 'Saira', sans-serif;
    overscroll-behavior-y: none;
  }
  #root { min-height: 100vh; }

  .dbk-btn:active { transform: scale(0.94); }
  .dbk-check:focus-visible, .dbk-btn:focus-visible, .dbk-input:focus-visible {
    outline: 2px solid #FFC83D; outline-offset: 2px;
  }
  .dbk-scroll::-webkit-scrollbar { height: 6px; }
  .dbk-scroll::-webkit-scrollbar-thumb { background: #3A5C8C; border-radius: 4px; }

  @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spin-slow { animation: spin-slow 9s linear infinite; }
  @keyframes pulse-aura { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
  .aura-pulse { animation: pulse-aura 1.8s ease-in-out infinite; }
  .aura-ultra { animation: pulse-aura 1.1s ease-in-out infinite; }
  @keyframes cloud-drift { from { transform: translateX(0); } to { transform: translateX(-140px); } }
  .cloud-drift { animation: cloud-drift 26s linear infinite; }

  @media (prefers-reduced-motion: reduce) {
    .spin-slow, .aura-pulse, .aura-ultra, .cloud-drift { animation: none !important; }
  }

  /* Respect iPhone safe areas (notch / home indicator) */
  .safe-top { padding-top: env(safe-area-inset-top); }
  .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
</style>
</head>
<body>
<div id="root"></div>

<script>
  // Captura de errores visible en pantalla, para diagnosticar sin herramientas de desarrollador.
  function showErrorOverlay(text) {
    if (document.getElementById('dbk-error-overlay')) return;
    var box = document.createElement('div');
    box.id = 'dbk-error-overlay';
    box.style.position = 'fixed';
    box.style.inset = '0';
    box.style.background = '#1a0a0a';
    box.style.color = '#ffd9d9';
    box.style.fontFamily = 'monospace';
    box.style.fontSize = '13px';
    box.style.padding = '20px';
    box.style.zIndex = '99999';
    box.style.overflow = 'auto';
    box.style.whiteSpace = 'pre-wrap';
    box.textContent = 'Error detectado:\n\n' + text;
    document.body.appendChild(box);
  }
  window.addEventListener('error', function (e) {
    showErrorOverlay(e.message + '\n' + (e.filename || '') + ':' + (e.lineno || '?'));
  });
  window.addEventListener('unhandledrejection', function (e) {
    showErrorOverlay('Promise error: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
</script>

<script>
  // Carga React, ReactDOM y Babel con respaldo automático: si el CDN principal (jsDelivr)
  // falla, probamos unpkg como segunda opción. Solo cuando los 3 están listos, cargamos app.js.
  function loadScript(urls, globalName) {
    return new Promise(function (resolve, reject) {
      var i = 0;
      function tryNext() {
        if (typeof window[globalName] !== 'undefined') return resolve();
        if (i >= urls.length) return reject(new Error('No se pudo cargar ' + globalName));
        var s = document.createElement('script');
        s.src = urls[i];
        s.crossOrigin = 'anonymous';
        s.onload = function () { resolve(); };
        s.onerror = function () {
          i++;
          tryNext();
        };
        document.head.appendChild(s);
      }
      tryNext();
    });
  }

  Promise.all([
    loadScript(['https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js', 'https://unpkg.com/react@18/umd/react.production.min.js'], 'React'),
    loadScript(['https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js', 'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'], 'ReactDOM'),
    loadScript(['https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js', 'https://unpkg.com/@babel/standalone@7/babel.min.js'], 'Babel'),
  ]).then(function () {
    var appScript = document.createElement('script');
    appScript.type = 'text/babel';
    appScript.setAttribute('data-presets', 'react');
    appScript.src = 'app.js';
    appScript.onerror = function () {
      showErrorOverlay('No se pudo ejecutar app.js (revisá que el archivo se haya subido bien).');
    };
    document.body.appendChild(appScript);
  }).catch(function (err) {
    showErrorOverlay('No se pudieron cargar las librerías necesarias.\n' + err.message + '\nRevisá tu conexión a internet.');
  });
</script>

<script>
  // Service worker temporalmente desactivado mientras depuramos un problema de carga.
  // Si había una versión vieja cacheada, esto la desregistra para evitar conflictos.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function (regs) {
      regs.forEach(function (reg) { reg.unregister(); });
    });
    if (window.caches) {
      caches.keys().then(function (names) {
        names.forEach(function (name) { caches.delete(name); });
      });
    }
  }
</script>
</body>
</html>
